# ENCODE VIDEO BASED ON A FILESIZE

8192 KILOBITS = 1024 KB × 8 KILOBITS


BITRATE_KBPS = (YOUR_TARGET_MB × 8192) / DURATION_SECONDS


# EXAMPLE:
  TARGET SIZE = 400 MB
  VIDEO LENGTH = 1 HOUR = 3600 SECONDS

# IN CALCULATOR
  (XXXX * 8192) / XXXX = XXXX KBPS TOTAL BITRATE


(300*8192) / 3190


