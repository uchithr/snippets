# BOOTKEYS

F 8 - ASUS
F9 - HP
F10 - BIOS


F11 - ASROCK
F12 - DELL

+--------------------+------------------+------------------+
| BRAND              | BOOT MENU        | BIOS / UEFI      |
+--------------------+------------------+------------------+
| ASUS               | Esc              | F2               |
| HP                 | Esc > F9         | Esc > F10        |
| DELL               | F12              | F2               |
| LENOVO             | F12              | F2 / Fn+F2       |
| ACER               | F12              | F2               |
| ASROCK             | F11              | F2 / Del         |
| MSI                | F11              | Del              |
| GIGABYTE           | F12              | Del              |
| SAMSUNG            | F10              | F2               |
| TOSHIBA / DYNABOOK | F12              | F2               |
| SURFACE            | VolDown+Power    | VolUp+Power      |
+--------------------+------------------+------------------+.

