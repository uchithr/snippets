## BOOTLOADER FIX - RECOMMENDED

# 1) Boot to Windows Recovery Environment > Command Prompt

diskpart
list vol
exit

dir C:\Windows
dir D:\Windows
dir E:\Windows

# Replace D: with the partition that contains Windows
bcdboot D:\Windows


## OPTIONAL - if EFI partition must be targeted manually (UEFI systems)

diskpart
list vol
select vol <EFI FAT32 volume>
assign letter=S
exit

bcdboot D:\Windows /s S: /f UEFI


## OPTIONAL - if disk errors are suspected

chkdsk D: /f /x /r


## OPTIONAL - if Windows can boot into Safe Mode and system files are damaged

dism /online /cleanup-image /restorehealth
sfc /scannow